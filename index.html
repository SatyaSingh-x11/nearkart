<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NearKart - Find Nearby Products Instantly</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/utilities.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
</head>

<body>

  <!-- 🔝 HEADER -->
  <header class="header glass">
    <div class="location">
      <span id="location-text">Detecting location...</span>
      <button id="change-location">Change</button>
    </div>
  </header>

  <!-- 🔍 MAIN -->
  <main>

    <!-- SEARCH SECTION -->
    <section class="search-section">
      <div class="search-bar glass">
        <input 
          type="text" 
          id="search-input" 
          placeholder="Search for products near you..." 
        />
      </div>
    </section>

    <!-- 🧩 CATEGORIES -->
    <section class="categories">
      <h2>Categories</h2>

      <div class="category-grid">

        <article class="category-card glass">
          <h3>Grocery</h3>
        </article>

        <article class="category-card glass">
          <h3>Electronics</h3>
        </article>

        <article class="category-card glass">
          <h3>Pharmacy</h3>
        </article>

      </div>
    </section>

    <!-- 🏪 NEARBY SHOPS -->
    <section class="shops">
      <h2>Nearby Shops</h2>

      <div class="shop-list" id="shop-list">

        <!-- Skeleton Loader -->
        <div class="shop-card skeleton"></div>
        <div class="shop-card skeleton"></div>
        <div class="shop-card skeleton"></div>

      </div>
    </section>

    <!-- 🔎 SEARCH RESULTS -->
    <section class="results" id="results-section">
      <h2>Results</h2>

      <div class="results-list" id="results-list">
        <!-- Dynamic content -->
      </div>
    </section>

  </main>

  <!-- 🔻 BOTTOM NAV (Thumb Friendly) -->
  <footer class="bottom-nav glass">

    <button class="nav-item active">
      <img src="assets/icons/home.svg" alt="Home" />
      <span>Home</span>
    </button>

    <button class="nav-item">
      <img src="assets/icons/search.svg" alt="Search" />
      <span>Search</span>
    </button>

    <button class="nav-item">
      <img src="assets/icons/cart.svg" alt="Cart" />
      <span>Cart</span>
    </button>

    <button class="nav-item">
      <img src="assets/icons/user.svg" alt="Profile" />
      <span>Profile</span>
    </button>

  </footer>

  <!-- JS -->
  <script src="assets/js/app.js"></script>
  <script src="assets/js/search.js"></script>
  <script src="assets/js/location.js"></script>
  <script src="assets/js/ui.js"></script>

</body>
  </html>
